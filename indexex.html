<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAM AI - Llama Edition</title>
    <style>
        :root { --bg: #131314; --side: #1e1f20; --text: #e3e3e3; --accent: #8ab4f8; }
        
        * { box-sizing: border-box; } 

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0;
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* Sidebar Settings */
        .sidebar { 
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%; 
            background: var(--side); border-right: 1px solid #333; 
            transition: 0.3s ease; z-index: 1000; padding: 25px;
        }
        .sidebar.active { left: 0; }

        .overlay { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.6); z-index: 999; backdrop-filter: blur(2px); 
        }
        .overlay.active { display: block; }

        .menu-toggle { position: fixed; top: 20px; left: 20px; cursor: pointer; font-size: 24px; z-index: 1001; }

        /* Main Area */
        .chat-area { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            width: 100%; height: 100%; position: relative;
        }

        #chat-box { 
            width: 100%; max-width: 800px; flex: 1; 
            overflow-y: auto; padding: 70px 20px 20px 20px;
            scrollbar-width: none; 
        }

        .msg { margin-bottom: 25px; line-height: 1.6; display: flex; gap: 15px; width: 100%; }
        .avatar { min-width: 36px; height: 36px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .sam-avatar { background: var(--accent); color: #000; }
        .text { flex: 1; word-wrap: break-word; overflow-wrap: break-word; }

        /* Input Container */
        .input-container { 
            width: 100%; max-width: 800px; padding: 10px 15px 30px 15px; 
            background: var(--bg);
        }

        .input-bar { 
            background: #1e1f20; border-radius: 30px; padding: 5px 20px; 
            display: flex; align-items: center; border: 1px solid #3c4043;
        }

        input { 
            flex: 1; background: transparent; border: none; color: white; 
            padding: 12px; outline: none; font-size: 16px; min-width: 0;
        }

        button#send-btn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 8px; font-weight: bold; }

        .loading { font-size: 12px; color: var(--accent); margin-bottom: 5px; display: none; text-align: center; width: 100%; }

        /* Sidebar Config */
        .sidebar input { width: 100%; background: #131314; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin: 10px 0; outline: none; }
        .save-btn { width: 100%; background: var(--accent); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleSidebar()">⚙️</div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h3 style="color: var(--accent);">SAM AI - LLAMA</h3>
        <label style="font-size: 12px;">OPENROUTER API KEY</label>
        <input type="password" id="api-key" placeholder="sk-or-...">
        <label style="font-size: 12px;">MODEL ID</label>
        <input type="text" id="model-id" value="meta-llama/llama-3.3-70b-instruct">
        <button class="save-btn" onclick="saveConfig()">SYNC SYSTEM</button>
    </div>

    <div class="chat-area">
        <div id="chat-box">
            <div class="msg">
                <div class="avatar sam-avatar">S</div>
                <div class="text">Mainframe Ready, Sir. SAM AI (Llama 3.3) active hai.</div>
            </div>
        </div>

        <div id="loader" class="loading">SAM is processing...</div>

        <div class="input-container">
            <div class="input-bar">
                <input type="text" id="user-input" placeholder="Type command, Sir..." autocomplete="off">
                <button id="send-btn" onclick="execute()">RUN</button>
            </div>
        </div>
    </div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function saveConfig() {
        localStorage.setItem('sam_key', document.getElementById('api-key').value.trim());
        localStorage.setItem('sam_model', document.getElementById('model-id').value.trim());
        toggleSidebar();
    }

    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('sam_key') || "";
        document.getElementById('model-id').value = localStorage.getItem('sam_model') || "meta-llama/llama-3.3-70b-instruct";
    };

    async function execute() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const loader = document.getElementById('loader');
        const val = input.value.trim();
        if(!val) return;

        box.innerHTML += `<div class="msg"><div class="avatar">U</div><div class="text">${val}</div></div>`;
        input.value = "";
        loader.style.display = "block";
        box.scrollTop = box.scrollHeight;

        const key = localStorage.getItem('sam_key');
        const model = localStorage.getItem('sam_model') || "meta-llama/llama-3.3-70b-instruct";

        if(!key) {
            addSamMsg("Sir, please enter API key in settings.");
            loader.style.display = "none";
            return;
        }

        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${key}`, 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": model,
                    "messages": [
                        {"role": "system", "content": "You are SAM AI. Speak in professional Hinglish. Call user Sir. Help with coding and tasks."}, 
                        {"role": "user", "content": val}
                    ]
                })
            });
            const data = await res.json();
            
            if(data.error) {
                addSamMsg("System Error: " + data.error.message);
            } else {
                const reply = data.choices[0].message.content;
                addSamMsg(reply);
                speak(reply);
            }
        } catch(e) {
            addSamMsg("Sir, connection fail ho gaya hai. Network check karein.");
        } finally {
            loader.style.display = "none";
            box.scrollTop = box.scrollHeight;
        }
    }

    function addSamMsg(text) {
        document.getElementById('chat-box').innerHTML += `<div class="msg"><div class="avatar sam-avatar">S</div><div class="text">${text}</div></div>`;
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            window.speechSynthesis.speak(utter);
        }
    }

    document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') execute(); };
        async function execute() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const loader = document.getElementById('loader');
        const val = input.value.trim();
        if(!val) return;

        // User Message UI
        box.innerHTML += `<div class="msg"><div class="avatar">U</div><div class="text">${val}</div></div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        // --- DIRECT OPEN COMMAND LOGIC ---
        const lowerVal = val.toLowerCase();
        if(lowerVal.startsWith("open ")) {
            let site = lowerVal.replace("open ", "").trim();
            if(!site.includes(".")) site += ".com";
            
            addSamMsg("Opening " + site + ", Sir.");
            speak("Opening " + site);
            
            setTimeout(() => {
                window.open("https://" + site, "_blank");
            }, 1000);
            return; // AI ke paas jane se pehle hi stop kar dega
        }
        // ---------------------------------

        loader.style.display = "block";
        const key = localStorage.getItem('sam_key');
        const model = localStorage.getItem('sam_model') || "meta-llama/llama-3.3-70b-instruct";

        if(!key) {
            addSamMsg("Sir, settings mein API key missing hai.");
            loader.style.display = "none";
            return;
        }

        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    "model": model,
                    "messages": [
                        {"role": "system", "content": "You are SAM AI. Speak in professional Hinglish. Call user Sir."}, 
                        {"role": "user", "content": val}
                    ]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            addSamMsg(reply);
            speak(reply);
        } catch(e) {
            addSamMsg("Error: Connection failure.");
        } finally {
            loader.style.display = "none";
            box.scrollTop = box.scrollHeight;
        }
    }

</script>
</body>
</html>
